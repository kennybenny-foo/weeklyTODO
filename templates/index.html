<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly TODO</title>

    <style>
        :root{
            --bg: #f3f6fb;
            --board: #ffffff;
            --ink: #111827;
            --muted: #6b7280;
            --border: rgba(17,24,39,.12);
            --shadow: 0 18px 45px rgba(17,24,39,.12);
            --radius: 20px;

            --marker-blue: #1d4ed8;
            --marker-green: #047857;
            --marker-orange: #c2410c;
            --marker-purple: #6d28d9;
        }

        *{ box-sizing: border-box; }

        body{
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            color: var(--ink);
            background:
              radial-gradient(900px 500px at 12% 8%, rgba(29,78,216,.10), transparent 60%),
              radial-gradient(900px 500px at 88% 14%, rgba(109,40,217,.10), transparent 60%),
              radial-gradient(900px 500px at 70% 95%, rgba(4,120,87,.10), transparent 60%),
              var(--bg);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px 14px;
        }

        .page{
            width: min(920px, 100%);
            text-align: center;
        }

        h1{
            margin: 0 0 8px;
            font-size: clamp(32px, 3.6vw, 46px);;
            letter-spacing: -0.02em;
        }

        .sub{
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 15px;
        }

        .board{
            background: var(--board);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* “whiteboard lines” texture */
        .board::before{
            content:"";
            position:absolute;
            inset:0;
            background:
              repeating-linear-gradient(
                0deg,
                rgba(17,24,39,.045),
                rgba(17,24,39,.045) 1px,
                transparent 1px,
                transparent 22px
              );
            opacity: .35;
            pointer-events:none;
        }

        /* subtle shine */
        .board::after{
            content:"";
            position:absolute;
            inset:-70px;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,.95), transparent 60%);
            opacity: .55;
            pointer-events:none;
            transform: rotate(-2deg);
        }

        .content{
            position: relative; /* above texture */
        }

        .controls{
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
            width: min(720px, 100%);
            margin: 0 auto;
        }

        #day_input{
            height: 46px;
            padding: 12px 14px;
            border: 2px solid rgba(17,24,39,.12);
            border-radius: 14px;
            font-size: 16px;
            outline: none;
            background: rgba(255,255,255,.92);
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        #day_input:focus{
            border-color: rgba(29,78,216,.40);
            box-shadow: 0 0 0 6px rgba(29,78,216,.10);
        }

        button{
            height: 46px;
            padding: 0 16px;
            border: 0;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 750;
            font-size: 15px;
            color: #fff;
            background: linear-gradient(180deg, rgba(29,78,216,.95), rgba(29,78,216,.75));
            box-shadow: 0 10px 20px rgba(29,78,216,.18);
            transition: transform .06s ease, filter .15s ease;
            white-space: nowrap;
        }

        button:hover{ filter: brightness(1.03); }
        button:active{ transform: translateY(1px); }

        .tip{
            margin: 10px auto 0;
            color: var(--muted);
            font-size: 13px;
        }

        .tip code{
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background: rgba(17,24,39,.06);
            border: 1px solid rgba(17,24,39,.10);
            padding: 2px 6px;
            border-radius: 10px;
        }

        .status{
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            min-height: 18px;
        }

        .dot{
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: rgba(107,114,128,.45);
        }
        .dot.ok{ background: rgba(4,120,87,.75); }
        .dot.warn{ background: rgba(194,65,12,.75); }
        .dot.busy{
            background: rgba(29,78,216,.75);
            animation: pulse 1s infinite ease-in-out;
        }
        @keyframes pulse{
            0%{ transform: scale(1); opacity: .7; }
            50%{ transform: scale(1.25); opacity: 1; }
            100%{ transform: scale(1); opacity: .7; }
        }

        #result_list{
            list-style: none;
            padding: 0;
            margin: 18px auto 0;
            width: min(760px, 100%);
            display: grid;
            gap: 12px;
            text-align: left;
        }

        #result_list li{
            border: 2px solid rgba(17,24,39,.10);
            border-radius: 16px;
            padding: 12px 14px;
            background: rgba(255,255,255,.92);
            box-shadow: 0 8px 18px rgba(17,24,39,.06);
        }

        .card-title{
            margin: 0 0 8px;
            display:flex;
            align-items:center;
            justify-content: space-between;
            gap: 10px;
            font-size: 17px;
            font-weight: 850;
        }

        .pill{
            font-size: 12px;
            font-weight: 850;
            padding: 4px 10px;
            border-radius: 999px;
            border: 2px solid rgba(17,24,39,.10);
            letter-spacing: .05em;
            text-transform: uppercase;
            background: rgba(255,255,255,.55);
        }

        .pill.indoor{
            border-color: rgba(29,78,216,.30);
            color: var(--marker-blue);
            background: rgba(29,78,216,.08);
        }

        .pill.outdoor{
            border-color: rgba(4,120,87,.30);
            color: var(--marker-green);
            background: rgba(4,120,87,.08);
        }

        .meta{
            color: rgba(17,24,39,.84);
            font-size: 14px;
            line-height: 1.4;
            display: grid;
            gap: 6px;
        }

        .label{
            color: var(--muted);
            font-weight: 800;
            margin-right: 6px;
        }

        #result_list li.empty{
            text-align: center;
            color: var(--muted);
            background: rgba(255,255,255,.75);
            border-style: dashed;
        }

        @media (max-width: 560px){
            .controls{ grid-template-columns: 1fr; }
            button{ width: 100%; }
        }
    </style>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        function setStatus(kind, text){
            $("#status_dot").removeClass("ok warn busy");
            if(kind) $("#status_dot").addClass(kind);
            $("#status_text").text(text);
        }

        function normalizeDay(day){
            day = (day || "").trim().toLowerCase();
            if(day === "") return "";
            return day.charAt(0).toUpperCase() + day.slice(1);
        }

        function safe(v){
            // minimal escaping to avoid breaking HTML rendering
            return String(v ?? "")
                .replaceAll("&","&amp;")
                .replaceAll("<","&lt;")
                .replaceAll(">","&gt;")
                .replaceAll('"',"&quot;")
                .replaceAll("'","&#039;");
        }

        function search() {
            var day = normalizeDay($("#day_input").val());

            $("#result_list").empty();

            if(day === ""){
                setStatus("warn", "Enter a day of the week first.");
                $("#result_list").append("<li class='empty'>Type a day like Monday, then click Search.</li>");
                return;
            }

            setStatus("busy", "Searching…");

            $.ajax({
              url: `/chores/${encodeURIComponent(day)}`,
              method: "GET",
              dataType: "json",
              success: function (data) {
                $("#result_list").empty();

                if(!Array.isArray(data) || data.length === 0){
                    setStatus("warn", "No chores found.");
                    $("#result_list").append("<li class='empty'>No chores found for <b>" + safe(day) + "</b>.</li>");
                    return;
                }

                setStatus("ok", "Loaded " + data.length + " chore" + (data.length === 1 ? "" : "s") + ".");

                for(var i = 0; i < data.length; i++) {
                    var title = data[i].title ?? "(Untitled)";
                    var category = data[i].category ?? "";
                    var est = data[i].estimated_time_minutes ?? "";
                    var priority = data[i].priority ?? "";
                    var notes = data[i].notes ?? "";

                    var pillClass = "";
                    if(String(category).toLowerCase() === "indoor") pillClass = "indoor";
                    if(String(category).toLowerCase() === "outdoor") pillClass = "outdoor";

                    $("#result_list").append(
                        "<li>"
                        +   "<div class='card-title'>"
                        +     "<span>" + safe(title) + "</span>"
                        +     (category ? "<span class='pill " + pillClass + "'>" + safe(category) + "</span>" : "")
                        +   "</div>"
                        +   "<div class='meta'>"
                        +     (est !== "" ? ("<div><span class='label'>Estimated:</span>" + safe(est) + " min</div>") : "")
                        +     (priority ? ("<div><span class='label'>Priority:</span>" + safe(priority) + "</div>") : "")
                        +     (notes ? ("<div><span class='label'>Notes:</span>" + safe(notes) + "</div>") : "")
                        +   "</div>"
                        + "</li>"
                    );
                }
              },
              error: function (xhr, status, err) {
                console.error("Error:", status, err, xhr.responseText);
                setStatus("warn", "Could not reach backend. Check your Flask route.");
                $("#result_list").empty().append(
                    "<li class='empty'>Error loading chores. Make sure your backend supports <code>/chores/&lt;day&gt;</code>.</li>"
                );
              }
            });
        }

        $(document).ready(function(){
            // Enter key triggers search
            $("#day_input").on("keydown", function(e){
                if(e.key === "Enter") search();
            });

            // Optional: prefill Monday and auto search
            $("#day_input").val("Monday");
            search();
        });
    </script>
</head>
<body>
    <div class="page">
        <h1>Weekly TODO</h1>
        <div class="sub">• Type a day and see your chores •</div>

        <div class="board">
            <div class="content">
                <div class="controls">
                    <input id="day_input" type="text" placeholder="e.g., Monday">
                    <button onclick="search()">Search</button>
                </div>

                <div class="tip">
                    Try: <code>Monday</code>, <code>Tuesday</code>, <code>Wednesday</code>, <code>Thursday</code>, <code>Friday</code>, <code>Saturday</code>, <code>Sunday</code>
                </div>

                <div class="status">
                    <span id="status_dot" class="dot"></span>
                    <span id="status_text">Ready</span>
                </div>

                <ul id="result_list"></ul>
            </div>
        </div>
    </div>
</body>
</html>
